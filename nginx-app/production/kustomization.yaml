apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: prod-

namespace: nginx-prod

resources:
  - ../base
  - namespace.yaml
  - ingress.yaml

commonLabels:
  environment: prod

patches:
  - target:
      kind: Deployment
      name: sre-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

