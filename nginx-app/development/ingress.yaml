apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ingress

spec:
  ingressClassName: nginx

  rules:
    - host: dev.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: dev-nginx-service

                port:
                  number: 80
