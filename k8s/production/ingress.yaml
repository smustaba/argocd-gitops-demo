apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: prod-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: prod.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: prod-sre-service

            port:
              number: 80
