apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app-dev
  template:
    metadata:
      labels:
        app: sre-app-dev
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80

