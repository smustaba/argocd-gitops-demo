apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
spec:
  replicas: 6
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80

